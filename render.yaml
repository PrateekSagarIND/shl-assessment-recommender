services:
  - type: web
    name: shl-assessment-recommender
    runtime: python
    pythonVersion: "3.11"
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    region: oregon
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
